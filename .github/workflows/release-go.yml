name: Release (Go)

on:
  push:
    tags:
      - "go/v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip tag prefix
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/go/}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Create clean tag for GoReleaser
        run: |
          git tag "${{ steps.tag.outputs.version }}" "$GITHUB_SHA"
        working-directory: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: code/go/go.mod
          cache-dependency-path: code/go/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: code/go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.version }}
