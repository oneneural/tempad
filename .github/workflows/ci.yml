name: CI

on:
  push:
    branches: [main]
    paths:
      - "code/go/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/go/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: code/go/go.mod
          cache-dependency-path: code/go/go.sum

      - name: Build
        run: go build ./cmd/tempad

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
