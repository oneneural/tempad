# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: tempad

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: tempad
    main: ./cmd/tempad
    binary: tempad
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: ../../LICENSE
        strip_parent: true
      - src: README.md
        strip_parent: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: oneneural
    name: tempad
  name_template: "TEMPAD Go {{ .Tag }}"
  header: |
    ## TEMPAD Go {{ .Version }}

    Go implementation of [TEMPAD](https://github.com/oneneural/tempad) — Temporal Execution & Management Poll-Agent Dispatcher.

    ### Install

    **Homebrew (macOS/Linux):**
    ```bash
    brew install oneneural/tap/tempad
    ```

    **Go install:**
    ```bash
    go install github.com/oneneural/tempad/cmd/tempad@{{ .Tag }}
    ```

    **Direct download:**
    ```bash
    curl -sSL https://raw.githubusercontent.com/oneneural/tempad/main/scripts/install.sh | bash
    ```

    Or download the archive for your platform below.
  footer: |
    **Full changelog**: https://github.com/oneneural/tempad/compare/{{ .PreviousTag }}...{{ .Tag }}
  prerelease: auto
  draft: false

brews:
  - name: tempad
    repository:
      owner: oneneural
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/oneneural/tempad
    description: "Temporal Execution & Management Poll-Agent Dispatcher — bridge issue trackers and developer workflows"
    license: MIT
    install: |
      bin.install "tempad"
    test: |
      system "#{bin}/tempad", "--version"
    skip_upload: auto
